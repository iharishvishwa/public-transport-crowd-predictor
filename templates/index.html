<!DOCTYPE html>
<html>
<head>
    <title>Public Transport Crowd Predictor</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f4f4;
        }

        form {
            background: white;
            padding: 20px;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            margin: 10px;
            padding: 8px;
            width: 200px;
        }

        button {
            padding: 10px 20px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Public Transport Crowd Prediction</h2>

    <form id="predictForm">
        <input type="number" id="hour" placeholder="Hour (0-23)" required><br>
        <input type="number" id="line_id" placeholder="Line ID" required><br>
        <input type="number" id="stop_id" placeholder="Stop ID" required><br>
        <button type="submit">Predict</button>
    </form>

    <div id="result"></div>

<script>
document.getElementById("predictForm").addEventListener("submit", function(e) {
    e.preventDefault();

    fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            hour: document.getElementById("hour").value,
            line_id: document.getElementById("line_id").value,
            stop_id: document.getElementById("stop_id").value
        })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("result").innerHTML =
            "Predicted Passengers: " + data.predicted_passengers.toFixed(2) +
            "<br>Status: " + data.verdict;
    });
});
</script>

</body>
</html>
